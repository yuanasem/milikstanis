<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Marker Custom - Fixed</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #instructions {
        position: absolute; top: 10px; left: 10px;
        background: rgba(0,0,0,0.7); color: white;
        padding: 12px; font-family: sans-serif; font-size: 14px;
        border-radius: 8px; z-index: 999;
        pointer-events: none; /* Agar tidak menghalangi klik pada AR */
      }
    </style>

    <script>
      // PENTING: Registrasi komponen harus dilakukan SEBELUM <a-scene>
      AFRAME.registerComponent('interactable', {
        init: function () {
          this.el.addEventListener('click', () => {
            const currentColor = this.el.getAttribute('color');
            const newColor = currentColor === '#FF0000' ? '#00FF00' : '#FF0000';
            this.el.setAttribute('color', newColor);
            console.log('Box diklik, warna berubah ke: ' + newColor);
          });
        }
      });
    </script>
  </head>

  <body>
    <div id="instructions">
      1. Izinkan akses kamera.<br>
      2. Arahkan ke marker (mymark.patt).<br>
      3. Ketuk kotak merah untuk interaksi.
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
      renderer="logarithmicDepthBuffer: true;"
      cursor="fuse: false; rayOrigin: mouse"> <a-marker type="pattern" url="mymark.patt">
        <a-box 
          id="medBox" 
          position="0 0.5 0" 
          rotation="0 45 0" 
          color="#FF0000"
          depth="0.5" height="0.5" width="0.5" 
          shadow 
          interactable> <a-text 
            value="Alat Medis" 
            align="center" 
            position="0 0.6 0" 
            color="#FFFFFF" 
            width="3">
          </a-text>
        </a-box>
      </a-marker>

      <a-entity camera></a-entity>

      <a-light type="ambient" color="#BBB"></a-light>
      <a-light type="directional" color="#FFF" intensity="0.6" position="-1 1 2"></a-light>

    </a-scene>
  </body>
</html>
